<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>番茄钟</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    <h1>番茄钟</h1>

    <div class="timer-ring">
      <div class="progress-ring">
        <svg class="progress-svg">
          <circle class="progress-bg"></circle>
          <circle class="progress-bar"></circle>
        </svg>
        <div class="time-display">
          <span id="time">25:00</span>
          <span id="state-text">工作中</span>
        </div>
      </div>
    </div>

    <div class="pomodoro-count">
      <span id="count">已完成 0 个番茄钟</span>
    </div>

    <div class="controls">
      <button id="startBtn" class="btn btn-primary">开始</button>
      <button id="resetBtn" class="btn btn-secondary">重置</button>
    </div>

    <button id="settingsBtn" class="btn btn-settings">⚙️ 设置</button>

    <div id="settingsModal" class="modal hidden">
      <div class="modal-content">
        <h2>设置</h2>
        <div class="setting-item">
          <label>工作时长 (分钟)</label>
          <input type="number" id="workDuration" value="25" min="1" max="60">
        </div>
        <div class="setting-item">
          <label>短休息 (分钟)</label>
          <input type="number" id="shortBreak" value="5" min="1" max="30">
        </div>
        <div class="setting-item">
          <label>长休息 (分钟)</label>
          <input type="number" id="longBreak" value="15" min="1" max="60">
        </div>
        <div class="modal-buttons">
          <button id="saveSettings" class="btn btn-primary">保存</button>
          <button id="cancelSettings" class="btn btn-secondary">取消</button>
        </div>
      </div>
    </div>
  </div>

  <script src="renderer.js"></script>
</body>
</html>
