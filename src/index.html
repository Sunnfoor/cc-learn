<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>番茄钟</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    <h1>番茄钟</h1>

    <div class="timer-ring">
      <div class="progress-ring">
        <svg class="progress-svg">
          <circle class="progress-bg"></circle>
          <circle class="progress-bar"></circle>
        </svg>
        <div class="time-display">
          <span id="time">25:00</span>
          <span id="state-text">工作中</span>
        </div>
      </div>
    </div>

    <div class="pomodoro-count">
      <span id="count">已完成 0 个番茄钟</span>
    </div>

    <div class="controls">
      <button id="startBtn" class="btn btn-primary">开始</button>
      <button id="resetBtn" class="btn btn-secondary">重置</button>
    </div>

    <button id="settingsBtn" class="btn btn-settings">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="3"/>
        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/>
      </svg>
    </button>
    <button id="statsBtn" class="btn btn-settings">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="18" y1="20" x2="18" y2="10"/>
        <line x1="12" y1="20" x2="12" y2="4"/>
        <line x1="6" y1="20" x2="6" y2="14"/>
      </svg>
    </button>
    <button id="cardBtn" class="btn btn-settings">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="3" width="18" height="18" rx="2"/>
        <circle cx="8.5" cy="8.5" r="1.5"/>
        <path d="M21 15l-5-5L5 21"/>
      </svg>
    </button>

    <div id="settingsModal" class="modal hidden">
      <div class="modal-content">
        <h2>设置</h2>
        <div class="setting-item">
          <label>工作时长 (分钟)</label>
          <input type="number" id="workDuration" value="25" min="1" max="60">
        </div>
        <div class="setting-item">
          <label>短休息 (分钟)</label>
          <input type="number" id="shortBreak" value="5" min="1" max="30">
        </div>
        <div class="setting-item">
          <label>长休息 (分钟)</label>
          <input type="number" id="longBreak" value="15" min="1" max="60">
        </div>
        <div class="modal-buttons">
          <button id="saveSettings" class="btn btn-primary">保存</button>
          <button id="cancelSettings" class="btn btn-secondary">取消</button>
        </div>
      </div>
    </div>

    <div id="statsModal" class="modal hidden">
      <div class="modal-content stats-modal-content">
        <div class="modal-header-row">
          <h2>专注统计</h2>
          <button id="closeStats" class="close-btn" aria-label="关闭">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <line x1="18" y1="6" x2="6" y2="18"/>
              <line x1="6" y1="6" x2="18" y2="18"/>
            </svg>
          </button>
        </div>
        <div class="stats-tabs">
          <button id="weeklyTab" class="stats-tab active">周报</button>
          <button id="monthlyTab" class="stats-tab">月报</button>
        </div>
        <div class="stats-navigation">
          <button id="prevPeriod" class="nav-btn">◀</button>
          <span id="statsPeriod" class="stats-period"></span>
          <button id="nextPeriod" class="nav-btn">▶</button>
        </div>
        <div id="statsContent" class="stats-content"></div>
      </div>
    </div>

    <div id="cardModal" class="modal hidden">
      <div class="modal-content card-modal-content">
        <div class="modal-header-row">
          <h2>专注卡片</h2>
          <button id="closeCard" class="close-btn" aria-label="关闭">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <line x1="18" y1="6" x2="6" y2="18"/>
              <line x1="6" y1="6" x2="18" y2="18"/>
            </svg>
          </button>
        </div>
        <div class="card-preview">
          <canvas id="cardCanvas" width="320" height="400"></canvas>
        </div>
        <div class="card-actions">
          <button id="downloadCard" class="btn btn-primary">下载</button>
          <button id="copyCard" class="btn btn-secondary">复制</button>
        </div>
      </div>
    </div>
  </div>

  <script src="renderer.js"></script>
</body>
</html>
